<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Nayeli ❤️</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:80px;
overflow:hidden;
}

h1{
font-size:35px;
color:#ff4da6;
}

p{
font-size:20px;
padding:20px;
}

.heart{
position:fixed;
top:-10px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>
</head>

<body>

<h1>🌸 Para Nayeli 🌸</h1>

<p>
Nayeli, estas flores son para ti.  
Aunque sean digitales representan lo mucho que te quiero.  

Desde que llegaste a mi vida todo tiene más color.  
Eres alguien muy especial para mí. 💐
</p>

<div style="font-size:60px">
🌸🌷🌹🌺🌸
</div>

<script>

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=Math.random()*3+2+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
